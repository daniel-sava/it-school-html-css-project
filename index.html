<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name - Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
        integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="style.css" rel="stylesheet">
    <script defer src="script.js" type="text/javascript"></script>
</head>

<body>
    <header class="header">
        <a class="logo" href="#"><span class="first-name">Your</span><span class="last-name"> name</span></a>
        <nav class="menu">
            <ul class="menu-list">
                <li class="menu-list-item">
                    <a class="link" href="#about-me">
                        <i class="fa-solid fa-user"></i> About Me
                    </a>
                </li>
                <li class="menu-list-item">
                    <a class="link" href="#my-experience">
                        <i class="fa-solid fa-briefcase"></i> My Experience
                    </a>
                </li>
                <li class="menu-list-item">
                    <a class="link" href="#projects">
                        <i class="fa-solid fa-hands-holding-circle"></i> Projects
                    </a>
                </li>
                <li class="menu-list-item">
                    <a class="link" href="#tech-stack">
                        <i class="fa-solid fa-code"></i> Tech Stack
                    </a>
                </li>
                <li class="menu-list-item">
                    <a class="link cta-button" href="#lets-talk">
                        <i class="fa-solid fa-comments"></i> Let's Talk
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    <section id="hero">
        <div class="me">
            <p class="intro">Hello, I’m</p>
            <h1 class="name">Your Name</h1>
            <h2 class="position">Front-End Web Developer</h2>
            <a class="resume cta-button" href="assets/resume.pdf" download>

            </a>
        </div>
        <div class="illustration">
            <img src="assets/images/hero.svg" alt="Your Name - Software Developer">
        </div>
    </section>
    <section id="statistics">
        <div class="statistic repos">
            <i class="fa-brands fa-github"></i> 150+ Repos
        </div>
        <div class="statistic projects">
            <i class="fa-solid fa-hands-holding-circle"></i> 200+ Projects
        </div>
        <div class="statistic years">
            <i class="fa-solid fa-calendar-check"></i> 3+ Years
        </div>
        <div class="statistic clients">
            <i class="fa-solid fa-people-group"></i> 10+ Clients
        </div>
    </section>

</html>
